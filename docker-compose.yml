services:
  caddy:
    image: caddy:2
    container_name: mtproxy-caddy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  alexbers:
    build: ./src
    container_name: mtproto-final
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./config.py:/home/tgproxy/config.py:ro
    depends_on:
      - caddy

volumes:
  caddy_data:
  caddy_config:
